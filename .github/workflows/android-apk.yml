name: Build Android APK

# Déclenché manuellement (Actions → Build Android APK → Run workflow)
# ou automatiquement sur chaque tag vX.Y.Z
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Generate icons & splash screens
        run: npx @capacitor/assets generate --android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: |
          VERSION=$(node -p "require('./package.json').version")
          cp android/app/build/outputs/apk/debug/app-debug.apk "growmanager-v${VERSION}.apk"
          echo "APK_NAME=growmanager-v${VERSION}.apk" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: growmanager-apk
          path: frontend/${{ env.APK_NAME }}
          retention-days: 30

      - name: Attach APK to release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: frontend/${{ env.APK_NAME }}
